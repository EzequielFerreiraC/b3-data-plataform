services:

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible local object storage
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: b3_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Bootstrap buckets on first run
  minio_init:
    image: minio/mc:latest
    container_name: b3_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/b3-bronze &&
        mc mb --ignore-existing local/b3-silver &&
        mc mb --ignore-existing local/b3-gold &&
        echo 'Buckets ready'
      "

  # ---------------------------------------------------------------------------
  # PostgreSQL — Airflow metadata database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: b3_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Apache Airflow — scheduler + webserver
  # ---------------------------------------------------------------------------
  airflow_init:
    build:
      context: ..
      dockerfile: z_infra/Dockerfile.airflow
    container_name: b3_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    command: db migrate
    volumes:
      - ../h_dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs

  airflow_webserver:
    build:
      context: ..
      dockerfile: z_infra/Dockerfile.airflow
    container_name: b3_airflow_webserver
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "b3-data-platform-secret"
      PYTHONPATH: /opt/airflow/b3_platform
      DATA_PATH_BRONZE: /opt/airflow/data/a_bronze
      DATA_PATH_SILVER: /opt/airflow/data/b_silver
      DATA_PATH_GOLD: /opt/airflow/data/c_gold
      OUTPUTS_PATH: /opt/airflow/outputs
    command: webserver
    ports:
      - "8080:8080"   # Airflow UI → http://localhost:8080
    volumes:
      - ../h_dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ../j_data:/opt/airflow/data
      - ../n_reports:/opt/airflow/outputs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow_scheduler:
    build:
      context: ..
      dockerfile: z_infra/Dockerfile.airflow
    container_name: b3_airflow_scheduler
    depends_on:
      airflow_init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PYTHONPATH: /opt/airflow/b3_platform
      DATA_PATH_BRONZE: /opt/airflow/data/a_bronze
      DATA_PATH_SILVER: /opt/airflow/data/b_silver
      DATA_PATH_GOLD: /opt/airflow/data/c_gold
      OUTPUTS_PATH: /opt/airflow/outputs
    command: scheduler
    volumes:
      - ../h_dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      - ../j_data:/opt/airflow/data
      - ../n_reports:/opt/airflow/outputs

  # ---------------------------------------------------------------------------
  # JupyterLab — interactive analysis
  # ---------------------------------------------------------------------------
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: b3_jupyter
    ports:
      - "8888:8888"   # JupyterLab → http://localhost:8888
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "b3data"
    volumes:
      - ..:/home/jovyan/work
    command: >
      start-notebook.sh
        --NotebookApp.token='b3data'
        --NotebookApp.password=''

volumes:
  minio_data:
  postgres_data:
  airflow_logs:
